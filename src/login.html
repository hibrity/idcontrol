<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idcontrol - Login</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.title{
text-align:center;
margin-bottom:20px;
font-size:22px;
}

</style>

</head>

<body>

<div class="card">

<div class="title">Idcontrol</div>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<br><br>

<button onclick="signup()">Criar conta</button>

</div>

<script type="module">

import { supabase } from "./lib/supabase.js"

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
return
}

window.location.href="pages/dashboard.html"

}

async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({
email,
password
})

if(error){
alert(error.message)
return
}

alert("Conta criada")

}

window.login=login
window.signup=signup

</script>

</body>
</html>
