<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Placas</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

video{
width:100%;
border-radius:10px;
background:black;
}

canvas{
display:none;
}

button{
padding:10px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:black;
}

.ghost{
background:#334155;
color:white;
}

.result{
background:#0b1220;
padding:12px;
border-radius:8px;
margin-top:10px;
}

</style>
</head>
<body>

<div class="wrap">

<div class="card">
<h2>OCR de Placa</h2>

<video id="video" autoplay></video>

<canvas id="canvas"></canvas>

<div style="margin-top:10px">

<button class="primary" onclick="capture()">Capturar placa</button>

<button class="ghost" onclick="startCamera()">Reiniciar câmera</button>

</div>

</div>

<div class="card">
<h3>Resultado</h3>

<div id="result" class="result">
Nenhuma leitura ainda
</div>

</div>

</div>

<script>

let video = document.getElementById("video")
let canvas = document.getElementById("canvas")
let resultBox = document.getElementById("result")

async function startCamera(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:"environment" }
})

video.srcObject = stream

}catch(err){

alert("Erro ao acessar câmera")

}

}

startCamera()

async function capture(){

const ctx = canvas.getContext("2d")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

resultBox.innerHTML="Lendo placa..."

const { data:{ text } } = await Tesseract.recognize(
canvas,
'eng'
)

let plate = extractPlate(text)

resultBox.innerHTML = `
Texto detectado:<br><b>${text}</b><br><br>
Placa provável:<br><b>${plate || "não identificada"}</b>
`

}

function extractPlate(text){

text = text.toUpperCase()

let pattern = /[A-Z]{3}[0-9][A-Z0-9][0-9]{2}/

let match = text.match(pattern)

if(match) return match[0]

return null

}

</script>

</body>
</html>
