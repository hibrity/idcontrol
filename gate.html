<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Portões</title>

<style>
*{box-sizing:border-box}

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

button{
padding:12px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#22c55e;color:black}
.secondary{background:#334155;color:white}
.danger{background:#ef4444;color:white}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px;
}

.item{
background:#0b1220;
padding:10px;
border-radius:8px;
margin-top:10px;
border:1px solid rgba(255,255,255,.05);
}

.status{
margin-top:10px;
font-size:14px;
color:#cbd5e1;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h2>Controle de Portões</h2>

<div class="status">
Sistema de teste para dispositivos Shelly
</div>

<div class="row">
<button class="secondary" onclick="location.href='index.html'">
Voltar ao sistema
</button>
</div>

</div>


<div class="card">

<h3>Portões</h3>

<div class="row">

<button class="primary" onclick="openGate('entrada')">
Abrir Entrada
</button>

<button class="primary" onclick="openGate('saida')">
Abrir Saída
</button>

<button class="primary" onclick="openGate('pedestre')">
Abrir Pedestre
</button>

<button class="primary" onclick="openGate('garagem')">
Abrir Garagem
</button>

</div>

<div id="result" class="item">
Nenhum comando enviado
</div>

</div>


<div class="card">

<h3>Status dos dispositivos</h3>

<div class="row">

<button class="secondary" onclick="checkStatus('entrada')">
Status Entrada
</button>

<button class="secondary" onclick="checkStatus('saida')">
Status Saída
</button>

<button class="secondary" onclick="checkStatus('pedestre')">
Status Pedestre
</button>

<button class="secondary" onclick="checkStatus('garagem')">
Status Garagem
</button>

</div>

</div>

</div>


<script>

const gates = {

entrada:{
ip:"192.168.1.70"
},

saida:{
ip:"192.168.1.71"
},

pedestre:{
ip:"192.168.1.72"
},

garagem:{
ip:"192.168.1.73"
}

}



async function openGate(name){

const gate=gates[name]

if(!gate){
show(`Portão não configurado`)
return
}

const url=`http://${gate.ip}/relay/0?turn=on`

try{

await fetch(url)

show(`Portão ${name} acionado`)

}catch(e){

show(`Erro ao abrir ${name}`)

}

}



async function checkStatus(name){

const gate=gates[name]

if(!gate){
show(`Portão não configurado`)
return
}

const url=`http://${gate.ip}/relay/0`

try{

const res=await fetch(url)

const data=await res.json()

show(`Status ${name}: ${data.ison ? "ligado":"desligado"}`)

}catch(e){

show(`Não foi possível acessar ${name}`)

}

}



function show(text){

document.getElementById("result").innerHTML=text

}

</script>

</body>
</html>
