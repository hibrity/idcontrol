<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idcontrol</title>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

window.supabase = createClient(
"https://zbxrpprwjrholrycwsqa.supabase.co",
"sb_publishable_c4O2UN_u487qWsu4TNwG0Q_OGj3aHNM"
)
</script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.wrap{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:black;
}

.ghost{
background:#334155;
color:white;
}

input,select{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:8px;
margin-bottom:10px;
}

.menu button{
margin-right:5px;
margin-bottom:5px;
}

.page{
display:none;
}

.page.active{
display:block;
}

.item{
background:#0b1220;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="wrap">

<div id="login">

<div class="card">

<h2>Idcontrol</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button class="primary" onclick="login()">Entrar</button>

<button class="ghost" onclick="signup()">Criar conta</button>

</div>

</div>

<div id="app" style="display:none">

<div class="menu">

<button onclick="openPage('dashboard')">Dashboard</button>

<button onclick="openPage('people')">Pessoas</button>

<button onclick="openPage('visitors')">Visitantes</button>

<button onclick="openPage('access')">Acessos</button>

<button onclick="openPage('history')">Histórico</button>

<button onclick="logout()">Sair</button>

</div>

<div id="dashboard" class="page active">

<div class="card">

<h3>Painel</h3>

<div id="stats"></div>

</div>

</div>

<div id="people" class="page">

<div class="card">

<h3>Cadastrar pessoa</h3>

<input id="person_name" placeholder="Nome">

<input id="person_document" placeholder="Documento">

<select id="person_type">

<option value="employee">Funcionário</option>

<option value="resident">Morador</option>

<option value="provider">Prestador</option>

</select>

<button class="primary" onclick="savePerson()">Salvar</button>

</div>

<div class="card">

<h3>Lista</h3>

<div id="people_list"></div>

</div>

</div>

<div id="visitors" class="page">

<div class="card">

<h3>Cadastrar visitante</h3>

<input id="visitor_name" placeholder="Nome">

<input id="visitor_document" placeholder="Documento">

<input id="visitor_host" placeholder="Responsável">

<button class="primary" onclick="saveVisitor()">Salvar</button>

</div>

<div class="card">

<h3>Lista</h3>

<div id="visitors_list"></div>

</div>

</div>

<div id="access" class="page">

<div class="card">

<h3>Registrar acesso</h3>

<select id="access_person"></select>

<select id="access_type">

<option value="entry">Entrada</option>

<option value="exit">Saída</option>

</select>

<input id="access_location" placeholder="Local">

<button class="primary" onclick="saveAccess()">Registrar</button>

</div>

<div class="card">

<h3>Últimos acessos</h3>

<div id="access_list"></div>

</div>

</div>

<div id="history" class="page">

<div class="card">

<h3>Histórico</h3>

<div id="history_list"></div>

</div>

</div>

</div>

</div>

<script>

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({email,password})

if(error){alert(error.message);return}

init()

}

async function signup(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabase.auth.signUp({email,password})

if(error){alert(error.message);return}

alert("Conta criada")

}

async function logout(){

await supabase.auth.signOut()

location.reload()

}

function openPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

async function getUser(){

const {data}=await supabase.auth.getUser()

return data.user

}

async function savePerson(){

const user=await getUser()

const name=document.getElementById("person_name").value
const doc=document.getElementById("person_document").value
const type=document.getElementById("person_type").value

await supabase.from("people").insert({

full_name:name,
document:doc,
type:type,
created_by:user.id

})

loadPeople()

}

async function saveVisitor(){

const user=await getUser()

const name=document.getElementById("visitor_name").value
const doc=document.getElementById("visitor_document").value
const host=document.getElementById("visitor_host").value

await supabase.from("visitors").insert({

full_name:name,
document:doc,
host_name:host,
created_by:user.id

})

loadVisitors()

}

async function saveAccess(){

const user=await getUser()

const person=document.getElementById("access_person").value
const type=document.getElementById("access_type").value
const location=document.getElementById("access_location").value

await supabase.from("access_logs").insert({

person_id:person,
access_type:type,
location_name:location,
created_by:user.id

})

loadAccess()

}

async function loadPeople(){

const {data}=await supabase.from("people").select("*")

const list=document.getElementById("people_list")

const select=document.getElementById("access_person")

list.innerHTML=""
select.innerHTML=""

data.forEach(p=>{

list.innerHTML+=`<div class="item">${p.full_name}</div>`

select.innerHTML+=`<option value="${p.id}">${p.full_name}</option>`

})

}

async function loadVisitors(){

const {data}=await supabase.from("visitors").select("*")

const list=document.getElementById("visitors_list")

list.innerHTML=""

data.forEach(v=>{

list.innerHTML+=`<div class="item">${v.full_name}</div>`

})

}

async function loadAccess(){

const {data}=await supabase.from("access_logs").select("*").order("created_at",{ascending:false})

const list=document.getElementById("access_list")

list.innerHTML=""

data.forEach(a=>{

list.innerHTML+=`<div class="item">${a.access_type} - ${a.location_name}</div>`

})

}

async function loadHistory(){

const {data}=await supabase.from("history").select("*")

const list=document.getElementById("history_list")

list.innerHTML=""

data.forEach(h=>{

list.innerHTML+=`<div class="item">${h.title}</div>`

})

}

async function init(){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

loadPeople()
loadVisitors()
loadAccess()
loadHistory()

}

(async()=>{

const {data}=await supabase.auth.getSession()

if(data.session) init()

})()

</script>

</body>
</html>
